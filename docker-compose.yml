services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: indra_biedaalt
      MYSQL_USER: prisma
      MYSQL_PASSWORD: prisma123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "mysql://prisma:prisma123@db:3306/indra_biedaalt"
      JWT_SECRET: "change-me-in-production"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

volumes:
  db_data:
  backend_uploads:
